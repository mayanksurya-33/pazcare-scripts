<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pazcare Component Library</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f16;
    --surface: #1a1a24;
    --surface-2: #22222f;
    --border: #2c2c3a;
    --text: #e8e8f0;
    --muted: #9a9aab;
    --purple: #9d72ff;
    --purple-tint: rgba(157, 114, 255, 0.14);
    --ok: #34d399;
    --warn: #e0b341;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "General Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 24px; }

  header { border-bottom: 1px solid var(--border); padding: 36px 0 28px; }
  header h1 { margin: 0 0 6px; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  header p { margin: 0; color: var(--muted); font-size: 14px; }
  .base {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 16px;
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--muted);
  }
  .base code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--text); }

  main { padding: 0; }
  .status-msg { text-align: center; color: var(--muted); padding: 48px 0; font-size: 14px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 40px 0 10px;
  }
  @media (max-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px)  { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--purple); transform: translateY(-2px); }

  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card h2 { margin: 0; font-size: 16px; font-weight: 600; flex: 1 1 auto; }
  .pill {
    flex: 0 0 auto; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 3px 7px; border-radius: 999px;
    background: rgba(224, 179, 65, 0.15); color: var(--warn);
  }
  .desc {
    margin: 0 0 14px; color: var(--muted); font-size: 12.5px;
    display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .note {
    margin: 0 0 12px; padding: 7px 10px; font-size: 11.5px;
    background: rgba(224, 179, 65, 0.12); color: var(--warn); border-radius: 8px;
  }
  .dep {
    margin: 0 0 12px; padding: 7px 10px; font-size: 11.5px;
    background: var(--purple-tint); color: #c5adff; border-radius: 8px;
  }

  .actions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
  .btn {
    border: none; cursor: pointer; padding: 7px 11px; border-radius: 8px;
    font-family: inherit; font-size: 11.5px; font-weight: 600;
    transition: background 0.15s, transform 0.1s; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-copy { background: var(--purple); color: #fff; }
  .btn-copy:hover { background: #875fe6; }
  .btn-copy.copied { background: var(--ok); color: #06281c; }
  .btn-link { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-link:hover { border-color: var(--purple); color: var(--purple); }
  .btn-link.disabled { opacity: 0.4; pointer-events: none; }

  footer { color: var(--muted); font-size: 12px; padding: 0 0 40px; }
  footer code { font-family: ui-monospace, Menlo, Consolas, monospace; color: var(--text); }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Pazcare Component Library</h1>
      <p>Live from GitHub — components auto-discovered from <code>dist/</code>.</p>
      <div class="base">CDN base: <code id="base"></code></div>
    </div>
  </header>

  <main class="wrap">
    <div class="status-msg" id="status">Loading components from GitHub…</div>
    <div class="grid" id="grid" style="display:none"></div>
  </main>

  <footer class="wrap">
    Auto-discovered via jsDelivr · metadata in <code>components.json</code> · add a script + push, it appears here.
  </footer>

<script>
  const REPO = "mayanksurya-33/pazcare-scripts";
  const REF = "main";
  const CDN = "https://cdn.jsdelivr.net/gh/" + REPO + "@" + REF + "/dist/";
  const GH_SRC = "https://github.com/" + REPO + "/blob/" + REF + "/src/";
  const LIST_API = "https://data.jsdelivr.com/v1/packages/gh/" + REPO + "@" + REF;
  const META_URL = "https://raw.githubusercontent.com/" + REPO + "/" + REF + "/components.json";

  // ---- clipboard with file:// fallback ----
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });
    }
    return legacyCopy(text);
  }
  function legacyCopy(text) {
    return new Promise(function (resolve) {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta); resolve();
    });
  }

  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  // ---- discover component files in dist/ ----
  function distFiles(tree) {
    const dist = (tree.files || []).find(function (f) { return f.type === "directory" && f.name === "dist"; });
    return dist ? dist.files.filter(function (f) { return f.type === "file"; }).map(function (f) { return f.name; }) : [];
  }
  function groupComponents(files) {
    const map = {};
    files.forEach(function (name) {
      const m = name.match(/^(.*)\.min\.(js|css)$/);
      if (!m) return;
      const id = m[1], ext = m[2];
      map[id] = map[id] || { id: id, js: false, css: false };
      map[id][ext === "js" ? "js" : "css"] = true;
    });
    return map;
  }

  const scriptTag = function (id) { return '<script src="' + CDN + id + '.min.js" defer><\/script>'; };
  const cssTag = function (id) { return '<link rel="stylesheet" href="' + CDN + id + '.min.css">'; };

  function copyButton(label, code) {
    const btn = document.createElement("button");
    btn.className = "btn btn-copy";
    btn.textContent = label;
    btn.addEventListener("click", function () {
      copyText(code).then(function () {
        const orig = btn.textContent;
        btn.textContent = "Copied!"; btn.classList.add("copied");
        setTimeout(function () { btn.textContent = orig; btn.classList.remove("copied"); }, 1400);
      });
    });
    return btn;
  }
  function linkButton(label, href) {
    const a = document.createElement("a");
    a.className = "btn btn-link" + (href ? "" : " disabled");
    a.textContent = label;
    if (href) { a.href = href; a.target = "_blank"; a.rel = "noopener"; }
    return a;
  }

  function buildCard(comp, meta) {
    const card = document.createElement("div");
    card.className = "card";

    const top = document.createElement("div");
    top.className = "card-top";
    const h2 = document.createElement("h2");
    h2.textContent = capitalize(meta.name || comp.id);
    top.appendChild(h2);
    if (meta.status === "experimental") {
      const pill = document.createElement("span");
      pill.className = "pill";
      pill.textContent = "Experimental";
      top.appendChild(pill);
    }
    card.appendChild(top);

    if (meta.description) {
      const desc = document.createElement("p");
      desc.className = "desc";
      desc.textContent = meta.description;
      card.appendChild(desc);
    }
    if (meta.dependsOn) {
      const dep = document.createElement("div");
      dep.className = "dep";
      dep.textContent = meta.dependsOn;
      card.appendChild(dep);
    }
    if (meta.note) {
      const note = document.createElement("div");
      note.className = "note";
      note.textContent = "⚠ " + meta.note;
      card.appendChild(note);
    }

    const actions = document.createElement("div");
    actions.className = "actions";
    if (comp.js) actions.appendChild(copyButton("Script", scriptTag(comp.id)));
    if (comp.css) actions.appendChild(copyButton("CSS", cssTag(comp.id)));
    actions.appendChild(linkButton("Docs ↗", meta.docs || ""));
    actions.appendChild(linkButton("Code ↗", GH_SRC + comp.id + (comp.js ? ".js" : ".css")));
    card.appendChild(actions);

    return card;
  }

  function orderedIds(components, metaMap) {
    const inMeta = Object.keys(metaMap).filter(function (id) { return components[id]; });
    const extras = Object.keys(components).filter(function (id) { return metaMap[id] === undefined; }).sort();
    return inMeta.concat(extras);
  }

  function render(components, metaMap) {
    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    document.getElementById("base").textContent = CDN;

    const ids = orderedIds(components, metaMap);
    let shown = 0;
    ids.forEach(function (id) {
      const meta = metaMap[id] || {};
      if (meta.hidden) return;
      grid.appendChild(buildCard(components[id], meta));
      shown++;
    });

    if (!shown) { status.textContent = "No components found in dist/."; return; }
    status.style.display = "none";
    grid.style.display = "grid";
  }

  Promise.all([
    fetch(LIST_API).then(function (r) { if (!r.ok) throw new Error("list " + r.status); return r.json(); }),
    fetch(META_URL).then(function (r) { return r.ok ? r.json() : { components: {} }; }).catch(function () { return { components: {} }; })
  ]).then(function (res) {
    const components = groupComponents(distFiles(res[0]));
    const metaMap = (res[1] && res[1].components) || {};
    render(components, metaMap);
  }).catch(function (err) {
    console.error(err);
    document.getElementById("status").textContent = "Couldn't load the component list from GitHub. Check your connection and refresh.";
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pazcare Component Library</title>
<style>
  :root {
    --purple: #9d72ff;
    --purple-tint: #e6e0ff;
    --light-grey: #f6f6f6;
    --dark-grey: #656565;
    --border: #e2e2e2;
    --text: #151515;
    --code-bg: #1e1e2a;
    --ok: #1f9d55;
    --warn: #b8860b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--light-grey);
    line-height: 1.5;
  }
  header { background: #fff; border-bottom: 1px solid var(--border); padding: 32px 24px; }
  .wrap { max-width: 920px; margin: 0 auto; }
  header h1 { margin: 0 0 6px; font-size: 26px; }
  header p { margin: 0; color: var(--dark-grey); font-size: 14px; }
  .base {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 14px;
    padding: 8px 12px; background: var(--light-grey); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--dark-grey);
  }
  .base code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--text); }

  main { padding: 28px 24px 64px; }
  .status-msg { text-align: center; color: var(--dark-grey); padding: 48px 0; font-size: 14px; }

  .card { background: #fff; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
  .card-head {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    padding: 18px 22px; user-select: none;
  }
  .card-head:hover { background: #fafafa; }
  .card-head h2 { margin: 0; font-size: 18px; flex: 0 0 auto; }
  .card-head .desc { margin: 0; color: var(--dark-grey); font-size: 13px; flex: 1 1 auto; }
  .chevron { transition: transform 0.2s ease; color: var(--dark-grey); flex: 0 0 auto; }
  .card.open .chevron { transform: rotate(180deg); }

  .pill { flex: 0 0 auto; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 999px; }
  .pill.experimental { background: #fff3cd; color: var(--warn); }

  .card-body { display: none; padding: 0 22px 22px; }
  .card.open .card-body { display: block; }

  .badge {
    display: inline-block; margin: 0 0 6px; padding: 5px 11px;
    background: var(--purple-tint); color: #5b3fb0; border-radius: 8px; font-size: 12px; font-weight: 500;
  }
  .note { margin: 0 0 6px; padding: 5px 11px; background: #fff3cd; color: var(--warn); border-radius: 8px; font-size: 12px; }

  .block { margin-top: 16px; }
  .block-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .block-head span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dark-grey); }
  .btn-row { display: flex; gap: 8px; }
  .copy-btn, .docs-btn {
    border: none; cursor: pointer; padding: 7px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600; transition: background 0.15s, transform 0.1s; text-decoration: none; display: inline-block;
  }
  .copy-btn { background: var(--purple); color: #fff; }
  .copy-btn:hover { background: #875fe6; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: var(--ok); }
  .docs-btn { background: #fff; color: var(--purple); border: 1px solid var(--purple); }
  .docs-btn:hover { background: var(--purple-tint); }

  pre {
    margin: 0; background: var(--code-bg); color: #e9e9f2; border-radius: 10px; padding: 16px;
    overflow-x: auto; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.6; white-space: pre;
  }
  .no-usage { color: var(--dark-grey); font-size: 13px; font-style: italic; margin: 16px 0 0; }
  footer { text-align: center; color: var(--dark-grey); font-size: 12px; padding: 0 24px 40px; }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Pazcare Component Library</h1>
      <p>Live from GitHub — components are auto-discovered from <code>dist/</code>. Click one to expand.</p>
      <div class="base">CDN base: <code id="base"></code></div>
    </div>
  </header>

  <main class="wrap" id="cards">
    <div class="status-msg" id="status">Loading components from GitHub…</div>
  </main>

  <footer>
    Auto-discovered via jsDelivr · descriptions &amp; usage live in
    <code>components.json</code> · add a script + push, it appears here.
  </footer>

<script>
  const REPO = "mayanksurya-33/pazcare-scripts";
  const REF = "main";
  const CDN = "https://cdn.jsdelivr.net/gh/" + REPO + "@" + REF + "/dist/";
  const LIST_API = "https://data.jsdelivr.com/v1/packages/gh/" + REPO + "@" + REF;
  const META_URL = "https://raw.githubusercontent.com/" + REPO + "/" + REF + "/components.json";

  // ---- clipboard with file:// fallback ----
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });
    }
    return legacyCopy(text);
  }
  function legacyCopy(text) {
    return new Promise(function (resolve) {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta); resolve();
    });
  }

  // ---- discover component files in dist/ ----
  function distFiles(tree) {
    const dist = (tree.files || []).find(function (f) { return f.type === "directory" && f.name === "dist"; });
    return dist ? dist.files.filter(function (f) { return f.type === "file"; }).map(function (f) { return f.name; }) : [];
  }
  function groupComponents(files) {
    const map = {};
    files.forEach(function (name) {
      const m = name.match(/^(.*)\.min\.(js|css)$/);
      if (!m) return;
      const id = m[1], ext = m[2];
      map[id] = map[id] || { id: id, js: false, css: false };
      map[id][ext === "js" ? "js" : "css"] = true;
    });
    return map;
  }

  function embedFor(comp) {
    const lines = [];
    if (comp.css) lines.push('<link rel="stylesheet" href="' + CDN + comp.id + '.min.css">');
    if (comp.js) lines.push('<script src="' + CDN + comp.id + '.min.js" defer><\/script>');
    return lines.join("\n");
  }

  function copyBlock(label, code) {
    const wrap = document.createElement("div");
    wrap.className = "block";
    const head = document.createElement("div");
    head.className = "block-head";
    const name = document.createElement("span");
    name.textContent = label;
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy " + label.toLowerCase();
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      copyText(code).then(function () {
        btn.textContent = "Copied!"; btn.classList.add("copied");
        setTimeout(function () { btn.textContent = "Copy " + label.toLowerCase(); btn.classList.remove("copied"); }, 1500);
      });
    });
    head.appendChild(name); head.appendChild(btn);
    const pre = document.createElement("pre");
    pre.textContent = code;
    wrap.appendChild(head); wrap.appendChild(pre);
    return wrap;
  }

  function buildCard(comp, meta) {
    const card = document.createElement("div");
    card.className = "card";

    const head = document.createElement("div");
    head.className = "card-head";

    const h2 = document.createElement("h2");
    h2.textContent = meta.name || comp.id;
    head.appendChild(h2);

    if (meta.status === "experimental") {
      const pill = document.createElement("span");
      pill.className = "pill experimental";
      pill.textContent = "Experimental";
      head.appendChild(pill);
    }

    const desc = document.createElement("p");
    desc.className = "desc";
    desc.textContent = meta.description || "";
    head.appendChild(desc);

    const chev = document.createElement("span");
    chev.className = "chevron";
    chev.textContent = "▾";
    head.appendChild(chev);

    head.addEventListener("click", function () { card.classList.toggle("open"); });

    const body = document.createElement("div");
    body.className = "card-body";

    if (meta.dependsOn) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = "↳ " + meta.dependsOn;
      body.appendChild(badge);
    }
    if (meta.note) {
      const note = document.createElement("div");
      note.className = "note";
      note.textContent = "⚠ " + meta.note;
      body.appendChild(note);
    }

    body.appendChild(copyBlock("Embed", embedFor(comp)));

    if (meta.usage) {
      body.appendChild(copyBlock("Usage", meta.usage));
    } else {
      const no = document.createElement("p");
      no.className = "no-usage";
      no.textContent = "No usage example yet — add one in components.json.";
      body.appendChild(no);
    }

    if (meta.docs) {
      const block = document.createElement("div");
      block.className = "block";
      const a = document.createElement("a");
      a.className = "docs-btn";
      a.href = meta.docs;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = "Read documentation →";
      block.appendChild(a);
      body.appendChild(block);
    }

    card.appendChild(head);
    card.appendChild(body);
    return card;
  }

  function orderedIds(components, metaMap) {
    // metadata-defined order first, then any extra discovered ids alphabetically
    const inMeta = Object.keys(metaMap).filter(function (id) { return components[id]; });
    const extras = Object.keys(components).filter(function (id) { return metaMap[id] === undefined; }).sort();
    return inMeta.concat(extras);
  }

  function render(components, metaMap) {
    const host = document.getElementById("cards");
    host.innerHTML = "";
    document.getElementById("base").textContent = CDN;

    const ids = orderedIds(components, metaMap);
    let shown = 0;
    ids.forEach(function (id) {
      const meta = metaMap[id] || {};
      if (meta.hidden) return;
      host.appendChild(buildCard(components[id], meta));
      shown++;
    });

    if (!shown) {
      host.innerHTML = '<div class="status-msg">No components found in dist/.</div>';
    }
  }

  function fail(msg) {
    document.getElementById("status").textContent = msg;
  }

  Promise.all([
    fetch(LIST_API).then(function (r) { if (!r.ok) throw new Error("list " + r.status); return r.json(); }),
    fetch(META_URL).then(function (r) { return r.ok ? r.json() : { components: {} }; }).catch(function () { return { components: {} }; })
  ]).then(function (res) {
    const components = groupComponents(distFiles(res[0]));
    const metaMap = (res[1] && res[1].components) || {};
    render(components, metaMap);
  }).catch(function (err) {
    console.error(err);
    fail("Couldn't load the component list from GitHub. Check your connection and refresh.");
  });
</script>
</body>
</html>

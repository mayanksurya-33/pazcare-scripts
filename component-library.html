<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pazcare Component Library</title>
<style>
  :root {
    --purple: #9d72ff;
    --purple-tint: #e6e0ff;
    --light-grey: #f6f6f6;
    --dark-grey: #656565;
    --border: #e2e2e2;
    --text: #151515;
    --code-bg: #1e1e2a;
    --ok: #1f9d55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--light-grey);
    line-height: 1.5;
  }
  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 32px 24px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  header h1 { margin: 0 0 6px; font-size: 26px; }
  header p { margin: 0; color: var(--dark-grey); font-size: 14px; }
  .base {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 14px; padding: 8px 12px;
    background: var(--light-grey); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--dark-grey);
  }
  .base code { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: var(--text); }

  main { padding: 28px 24px 64px; }
  .card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; margin-bottom: 20px;
  }
  .card-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .card h2 { margin: 0; font-size: 19px; }
  .card .desc { margin: 6px 0 0; color: var(--dark-grey); font-size: 14px; }
  .badge {
    display: inline-block; margin-top: 10px; padding: 4px 10px;
    background: var(--purple-tint); color: #5b3fb0;
    border-radius: 999px; font-size: 11px; font-weight: 600;
  }

  .block { margin-top: 18px; }
  .block-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .block-head span { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dark-grey); }
  .copy-btn {
    border: none; cursor: pointer;
    background: var(--purple); color: #fff;
    padding: 7px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 600;
    transition: background 0.15s, transform 0.1s;
  }
  .copy-btn:hover { background: #875fe6; }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn.copied { background: var(--ok); }

  pre {
    margin: 0; background: var(--code-bg); color: #e9e9f2;
    border-radius: 10px; padding: 16px; overflow-x: auto;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.6;
    white-space: pre;
  }
  footer { text-align: center; color: var(--dark-grey); font-size: 12px; padding: 0 24px 40px; }
</style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Pazcare Component Library</h1>
      <p>Click <strong>Copy embed</strong> for the CDN tags, or <strong>Copy usage</strong> for the ready-to-paste markup.</p>
      <div class="base">Served from <code id="base"></code></div>
    </div>
  </header>

  <main class="wrap" id="cards"></main>

  <footer>Auto-refreshes on push via jsDelivr · add a component by appending one entry to the <code>COMPONENTS</code> array.</footer>

<script>
  const BASE = "https://cdn.jsdelivr.net/gh/mayanksurya-33/pazcare-scripts@main/dist/";

  const COMPONENTS = [
    {
      id: "searchbar",
      name: "CMS Searchbar",
      desc: "Client-side search over a Webflow CMS collection. Fetches once, caches in localStorage, filters in-browser. Press Enter is blocked so Webflow's search page never hijacks it.",
      css: "searchbar.min.css",
      js: "searchbar.min.js",
      usage:
`<div class="search-container">
  <input id="searchInput" type="text" placeholder="Search..." />
  <div id="searchResults"></div>
</div>

<script>
  WebflowCMS.init({
    collection: 'hr-glossaries',
    fields: ['name', 'slug', 'summary', 'meta-description'],
    saveTo: 'glossaryData',
    search: { input: '#searchInput', results: '#searchResults' },
  });
<\/script>`
    },
    {
      id: "glossary",
      name: "Glossary Renderer",
      desc: "Renders a CMS collection as an A–Z accordion glossary, with a built-in loading spinner that clears itself when content arrives.",
      dependsOn: "Requires the CMS Searchbar script — it uses WebflowCMS to load the data.",
      css: "glossary.min.css",
      js: "glossary.min.js",
      usage:
`<div id="paz-gloss-container"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    PazGlossary.renderLoading('#paz-gloss-container', 'Loading glossary…');

    WebflowCMS.init({
      collection: 'hr-glossaries',
      fields: ['name', 'slug', 'summary', 'meta-description'],
      saveTo: 'glossaryData',
      search: { input: '#searchInput', results: '#searchResults' },
      onLoad: function (items) {
        PazGlossary.render({
          container: '#paz-gloss-container',
          data: items,
          slugBase: '/hr-glossaries/',
          defaultOpen: 'all',
        });
      },
    });
  });
<\/script>`
    },
    {
      id: "modal",
      name: "Modal",
      desc: "Accessible modal engine. Auto-injects the close button (no need to add one per modal), closes on overlay click, Esc, or any [data-paz-modal-close]. Open via a data attribute or PazModal.open('id').",
      css: "modal.min.css",
      js: "modal.min.js",
      usage:
`<!-- Trigger -->
<button data-paz-modal="demo-modal">Open modal</button>

<!-- Modal (no close button needed — it's injected) -->
<div id="demo-modal" class="paz-modal">
  <div class="paz-modal-card">
    Your content here…
  </div>
</div>`
    }
  ];

  function embedFor(c) {
    var lines = [];
    if (c.css) lines.push('<link rel="stylesheet" href="' + BASE + c.css + '">');
    if (c.js) lines.push('<script src="' + BASE + c.js + '" defer><\/script>');
    return lines.join("\n");
  }

  function block(label, code) {
    var wrap = document.createElement("div");
    wrap.className = "block";

    var head = document.createElement("div");
    head.className = "block-head";
    var name = document.createElement("span");
    name.textContent = label;
    var btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy " + label.toLowerCase();
    head.appendChild(name);
    head.appendChild(btn);

    var pre = document.createElement("pre");
    pre.textContent = code;

    btn.addEventListener("click", function () {
      navigator.clipboard.writeText(code).then(function () {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(function () {
          btn.textContent = "Copy " + label.toLowerCase();
          btn.classList.remove("copied");
        }, 1500);
      });
    });

    wrap.appendChild(head);
    wrap.appendChild(pre);
    return wrap;
  }

  function render() {
    document.getElementById("base").textContent = BASE;
    var host = document.getElementById("cards");

    COMPONENTS.forEach(function (c) {
      var card = document.createElement("div");
      card.className = "card";

      var head = document.createElement("div");
      head.className = "card-head";
      var h2 = document.createElement("h2");
      h2.textContent = c.name;
      head.appendChild(h2);
      card.appendChild(head);

      var desc = document.createElement("p");
      desc.className = "desc";
      desc.textContent = c.desc;
      card.appendChild(desc);

      if (c.dependsOn) {
        var badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "↳ " + c.dependsOn;
        card.appendChild(badge);
      }

      card.appendChild(block("Embed", embedFor(c)));
      card.appendChild(block("Usage", c.usage));

      host.appendChild(card);
    });
  }

  render();
</script>
</body>
</html>
